name: checks
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tests/hooks.test.mjs
      - run: scripts/check-drift
      - run: scripts/check-doc-consistency
      - run: scripts/check-installers
      - run: scripts/check-skill-template-contract
      - run: scripts/check-template-sections
  # Hooks are pure Node — prove it on Windows (canaries are bash dev-tooling, ubuntu-only).
  check-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tests/hooks.test.mjs
      # Installer smoke on a real Windows FS: junction links, hooks.json, doctor, uninstall.
      # Evidence run for the README host-status ledger (docs/evidence/HOST-INSTALL.md).
      - name: installer smoke (temp USERPROFILE)
        shell: pwsh
        run: |
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP "loom-home"
          New-Item -ItemType Directory -Force -Path $env:USERPROFILE | Out-Null
          node scripts/install.mjs --cursor
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node scripts/install.mjs --doctor
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node scripts/install.mjs --uninstall --cursor
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node scripts/install.mjs --doctor
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
