name: checks
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tests/hooks.test.mjs && node tests/loop-checks.test.mjs
      - run: scripts/check-drift
      - run: scripts/check-doc-consistency
      - run: scripts/check-installers
      - run: scripts/check-loop-starters
      - run: scripts/check-loop-config
      - run: scripts/check-skill-template-contract
      - run: scripts/check-template-sections
